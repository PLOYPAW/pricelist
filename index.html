<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ploypaw Pet Shop - Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand-pink: #F96096; }
        * { font-family: 'Mitr', sans-serif; }
        body { background-color: #fff5f8; color: #4a5568; letter-spacing: -0.01em; }
        
        /* Glass Effect */
        .glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
        }

        /* Card Animation */
        .card-hover { 
            transition: all 0.3s ease; 
        }
        
        @media (min-width: 1024px) {
            .card-hover:hover { 
                transform: translateY(-8px); 
                box-shadow: 0 20px 25px -5px rgba(249, 96, 150, 0.15); 
            }
        }

        /* Bulk Price Background */
        .bulk-badge { 
            background: linear-gradient(135deg, #F96096 0%, #e04d82 100%); 
        }

        /* Scrollbar Hiding */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ปรับแต่งความสูงรูปภาพให้เหมาะสมกับ 2 คอลัมน์บนมือถือ */
        .product-image-container {
            aspect-ratio: 1 / 1;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header Section (ปรับขนาดเล็กลงเล็กน้อยสำหรับมือถือ) -->
    <header class="bg-[#F96096] text-white py-12 md:py-20 px-4 shadow-xl mb-6 relative overflow-hidden">
        <div class="absolute inset-0 opacity-10">
            <svg class="h-full w-full" fill="currentColor" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M0 100 Q 50 0 100 100 Z" />
            </svg>
        </div>
        <div class="max-w-6xl mx-auto text-center relative z-10">
            <h1 class="text-5xl md:text-7xl font-semibold mb-2 md:mb-4 tracking-tighter italic">Ploypaw</h1>
            <div class="flex items-center justify-center gap-2">
                <span class="text-xl md:text-3xl animate-bounce">🐾</span>
                <p class="text-lg md:text-2xl font-normal text-pink-50">โลกของคนรักสัตว์</p>
                <span class="text-xl md:text-3xl animate-bounce">🐾</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6">
        <!-- Search & Filter Area -->
        <div class="glass sticky top-2 z-30 p-4 md:p-6 rounded-[1.5rem] md:rounded-[2rem] shadow-lg mb-8 flex flex-col gap-4 border border-pink-100">
            <!-- Search Bar -->
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-pink-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="searchInput" placeholder="ค้นหาสินค้า..." 
                    class="w-full pl-11 pr-4 py-3 md:py-4 rounded-full border-none ring-2 ring-pink-50 focus:ring-4 focus:ring-pink-200 outline-none transition-all text-base md:text-xl font-light">
            </div>
            <!-- Category Filters (ปรับขนาดให้เล็กลง) -->
            <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar" id="categoryFilters"></div>
        </div>

        <!-- Price Grid (ปรับเป็น 2 คอลัมน์บนมือถือ: grid-cols-2) -->
        <div id="priceGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-8"></div>

        <!-- Loading State -->
        <div id="loading" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-pink-500 mb-4"></div>
            <p class="text-pink-400 text-lg font-medium">กำลังโหลดข้อมูล...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <div class="text-6xl mb-4">🐾</div>
            <p class="text-pink-300 text-xl font-medium">ไม่พบสินค้าที่คุณค้นหา</p>
        </div>
    </main>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgOz7WIAMIIwhmJ8jPy7ouaRtOkJddwn7EvZW_9z7CGdOJIsVW-FuXdBaZbWlwNXUJSR-SrAf9iBpM/pub?output=csv'; 

        let allProducts = [];
        let currentCategory = 'All';

        async function fetchData() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                allProducts = csvToJSON(data);
                renderUI();
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading').innerHTML = `<p class="text-pink-600 font-medium">โหลดข้อมูลไม่สำเร็จ</p>`;
            }
        }

        function csvToJSON(csv) {
            const lines = csv.split("\n");
            const result = [];
            const headers = lines[0].split(",").map(h => h.trim().replace(/[^\w]/gi, ''));
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                const obj = {};
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                for (let j = 0; j < headers.length; j++) {
                    let value = currentline[j]?.trim() || '';
                    value = value.replace(/^"(.*)"$/, '$1');
                    obj[headers[j]] = value;
                }
                result.push(obj);
            }
            return result;
        }

        function renderUI() {
            document.getElementById('loading').classList.add('hidden');
            const categories = ['All', ...new Set(allProducts.map(p => p.Category).filter(Boolean))];
            const filterContainer = document.getElementById('categoryFilters');
            
            // ปรับขนาดปุ่มหมวดหมู่ให้เล็กลง (px-4 py-2 text-sm)
            filterContainer.innerHTML = categories.map(cat => `
                <button onclick="filterCategory('${cat}')" 
                    class="category-btn whitespace-nowrap px-4 py-2 rounded-full transition-all font-medium text-sm border ${currentCategory === cat ? 'bg-[#F96096] text-white border-[#F96096] shadow-md' : 'bg-white text-pink-400 border-pink-100 hover:bg-pink-50'}">
                    ${cat === 'All' ? 'ทั้งหมด' : cat}
                </button>
            `).join('');
            updateGrid();
        }

        function updateGrid() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('priceGrid');
            const filtered = allProducts.filter(p => {
                const matchesSearch = p.ItemName?.toLowerCase().includes(searchTerm) || p.Description?.toLowerCase().includes(searchTerm);
                const matchesCategory = currentCategory === 'All' || p.Category === currentCategory;
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                document.getElementById('emptyState').classList.remove('hidden');
            } else {
                document.getElementById('emptyState').classList.add('hidden');
                grid.innerHTML = filtered.map(item => `
                    <div class="bg-white rounded-[1.5rem] md:rounded-[2.5rem] overflow-hidden border-2 md:border-4 border-white shadow-sm card-hover flex flex-col relative">
                        <!-- Category Badge (เล็กลงบนมือถือ) -->
                        <div class="absolute top-2 left-2 md:top-4 md:left-4 z-10 bg-white/90 px-2 md:px-4 py-1 rounded-full text-[9px] md:text-[10px] font-medium uppercase text-pink-500 shadow-sm border border-pink-50">
                            ${item.Category}
                        </div>
                        
                        <!-- Image Container -->
                        <div class="product-image-container overflow-hidden bg-pink-50 relative">
                            <img src="${item.ImageURL || 'https://via.placeholder.com/400x400?text=Ploypaw'}" 
                                alt="${item.ItemName}" 
                                class="w-full h-full object-cover"
                                onerror="this.src='https://via.placeholder.com/400x400?text=Ploypaw'">
                        </div>

                        <!-- Content Area -->
                        <div class="p-3 md:p-6 flex-grow flex flex-col">
                            <h3 class="text-sm md:text-2xl font-medium text-gray-800 mb-1 md:mb-2 leading-tight line-clamp-2 h-10 md:h-auto">${item.ItemName}</h3>
                            <p class="text-[10px] md:text-sm text-gray-400 mb-3 md:mb-6 font-light italic line-clamp-1">"${item.Description || '-'}"</p>
                            
                            <div class="space-y-2 md:space-y-4 mt-auto">
                                <!-- Retail Price -->
                                <div class="flex items-center justify-between p-2 md:p-4 rounded-[1rem] bg-gray-50 border border-gray-100">
                                    <span class="text-[9px] md:text-xs font-medium text-gray-400">ปลีก</span>
                                    <div class="text-right">
                                        <span class="text-sm md:text-xl font-medium text-gray-700">฿${item.RetailPrice}</span>
                                        <span class="text-[8px] md:text-xs text-gray-400 block font-light">/${item.RetailUnit}</span>
                                    </div>
                                </div>

                                <!-- Wholesale Section -->
                                <div class="bulk-badge p-3 md:p-5 rounded-[1.2rem] md:rounded-[1.8rem] text-white shadow-md relative overflow-hidden">
                                    <div class="flex justify-between items-start mb-1 md:mb-2">
                                        <span class="text-[8px] md:text-[10px] font-medium uppercase bg-white/20 px-2 py-0.5 rounded-full">ส่ง</span>
                                        <span class="text-[8px] md:text-[10px] font-light opacity-90">ขั้นต่ำ ${item.MinWholesaleQty}</span>
                                    </div>
                                    <div class="flex items-baseline gap-0.5 mb-2 md:mb-3">
                                        <span class="text-lg md:text-3xl font-semibold">฿${item.WholesalePrice}</span>
                                        <span class="text-[8px] md:text-xs opacity-80">/${item.WholesaleUnit}</span>
                                    </div>

                                    ${(item.BulkPrice && item.BulkPrice !== '0' && item.BulkPrice !== '') ? `
                                    <div class="pt-2 border-t border-white/20 flex justify-between items-center">
                                        <div class="flex flex-col">
                                            <span class="text-[8px] md:text-[10px] font-medium text-pink-100 italic">Special Step</span>
                                        </div>
                                        <div class="text-right">
                                            <span class="text-sm md:text-xl font-semibold">฿${item.BulkPrice}</span>
                                        </div>
                                    </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function filterCategory(cat) { currentCategory = cat; renderUI(); }
        document.getElementById('searchInput').addEventListener('input', updateGrid);
        window.onload = fetchData;
    </script>
</body>
</html>
