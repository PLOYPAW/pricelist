<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ploypaw Pet Shop - Mitr Font Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้ฟอนต์ Mitr จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-pink: #F96096;
        }

        /* บังคับใช้ฟอนต์ Mitr ทั้งหน้าเว็บ */
        * {
            font-family: 'Mitr', sans-serif;
        }

        body { 
            background-color: #fff5f8; 
            color: #4a5568;
            letter-spacing: -0.01em;
        }

        .pink-brand { color: var(--brand-pink); }
        .bg-pink-brand { background-color: var(--brand-pink); }
        .border-pink-brand { border-color: var(--brand-pink); }
        
        .glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
        }

        .card-hover { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        .card-hover:hover { 
            transform: translateY(-10px) scale(1.02); 
            box-shadow: 0 25px 30px -10px rgba(249, 96, 150, 0.2); 
        }

        .bulk-badge { 
            background: linear-gradient(135deg, #F96096 0%, #e04d82 100%);
            border-radius: 1.5rem;
        }

        /* Custom Scrollbar สำหรับ Category */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ปรับแต่งความโค้งมน */
        .rounded-brand { border-radius: 1.5rem; }
        .rounded-full-brand { border-radius: 9999px; }
        
        /* ปรับน้ำหนักฟอนต์เฉพาะจุด */
        h1, h3 { font-weight: 500; }
        .font-light-mitr { font-weight: 300; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header Section -->
    <header class="bg-pink-brand text-white py-20 px-4 shadow-xl mb-8 relative overflow-hidden">
        <div class="absolute inset-0 opacity-10">
            <svg class="h-full w-full" fill="currentColor" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M0 100 Q 50 0 100 100 Z" />
            </svg>
        </div>
        <div class="max-w-6xl mx-auto text-center relative z-10">
            <h1 class="text-7xl font-semibold mb-4 tracking-tighter italic">Ploypaw</h1>
            <div class="flex items-center justify-center gap-3">
                <span class="text-3xl animate-bounce">🐾</span>
                <p class="text-2xl font-normal text-pink-50">ยินดีต้อนรับสู่โลกของคนรักสัตว์</p>
                <span class="text-3xl animate-bounce">🐾</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6">
        <!-- Search & Filter Area -->
        <div class="glass sticky top-4 z-30 p-6 rounded-[2rem] shadow-xl mb-12 flex flex-col lg:flex-row gap-6 border border-pink-100">
            <div class="relative flex-grow">
                <span class="absolute inset-y-0 left-0 pl-5 flex items-center text-pink-400">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="searchInput" placeholder="พิมพ์ชื่อสินค้าเพื่อค้นหา..." 
                    class="w-full pl-14 pr-6 py-5 rounded-full border-none ring-2 ring-pink-50 focus:ring-4 focus:ring-pink-300 outline-none transition-all text-xl font-light">
            </div>
            <div class="flex gap-3 overflow-x-auto pb-2 lg:pb-0 no-scrollbar" id="categoryFilters">
                <!-- หมวดหมู่จะปรากฏที่นี่ -->
            </div>
        </div>

        <!-- Price Grid -->
        <div id="priceGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <!-- รายการสินค้าจะปรากฏที่นี่ -->
        </div>

        <!-- State Components -->
        <div id="loading" class="text-center py-32">
            <div class="inline-block animate-spin rounded-full h-20 w-20 border-t-4 border-pink-500 mb-6"></div>
            <p class="text-pink-400 text-2xl font-medium">กำลังเปิดโกดังสินค้า...</p>
        </div>

        <div id="emptyState" class="hidden text-center py-32">
            <div class="text-8xl mb-6">🐾</div>
            <p class="text-pink-300 text-3xl font-medium">ไม่พบสินค้าในหมวดหมู่นี้เลยโฮ่ง!</p>
        </div>
    </main>

    <script>
        // ใส่ URL ที่เป็น CSV format จาก Google Sheets
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgOz7WIAMIIwhmJ8jPy7ouaRtOkJddwn7EvZW_9z7CGdOJIsVW-FuXdBaZbWlwNXUJSR-SrAf9iBpM/pub?output=csv'; 

        let allProducts = [];
        let currentCategory = 'All';

        async function fetchData() {
            try {
                if (!sheetUrl) {
                    console.warn("Please provide a valid sheetUrl");
                    return;
                }
                const response = await fetch(sheetUrl);
                const data = await response.text();
                allProducts = csvToJSON(data);
                renderUI();
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loading').innerHTML = `<p class="text-pink-600 font-medium text-xl">การโหลดข้อมูลขัดข้อง (ตรวจสอบว่าได้ Publish as CSV หรือยัง?)</p>`;
            }
        }

        function csvToJSON(csv) {
            const lines = csv.split("\n");
            const result = [];
            // ดึง Headers และตัดช่องว่าง/ตัวอักษรพิเศษที่อาจติดมา
            const headers = lines[0].split(",").map(h => h.trim().replace(/[^\w]/gi, ''));
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                const obj = {};
                // ใช้ regex เพื่อจัดการ comma ภายในเครื่องหมายคำพูด (ถ้ามี)
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

                for (let j = 0; j < headers.length; j++) {
                    let value = currentline[j]?.trim() || '';
                    // ลบเครื่องหมายคำพูดที่ล้อมรอบค่า (ถ้ามี)
                    value = value.replace(/^"(.*)"$/, '$1');
                    obj[headers[j]] = value;
                }
                result.push(obj);
            }
            return result;
        }

        function renderUI() {
            document.getElementById('loading').classList.add('hidden');
            const categories = ['All', ...new Set(allProducts.map(p => p.Category).filter(Boolean))];
            const filterContainer = document.getElementById('categoryFilters');
            filterContainer.innerHTML = categories.map(cat => `
                <button onclick="filterCategory('${cat}')" 
                    class="category-btn whitespace-nowrap px-10 py-5 rounded-full transition-all font-medium text-lg border-2 ${currentCategory === cat ? 'bg-pink-brand text-white border-pink-brand shadow-lg scale-105' : 'bg-white text-pink-400 border-pink-50 hover:bg-pink-50'}">
                    ${cat === 'All' ? 'สินค้าทั้งหมด ✨' : cat}
                </button>
            `).join('');
            updateGrid();
        }

        function updateGrid() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('priceGrid');
            const filtered = allProducts.filter(p => {
                const matchesSearch = p.ItemName?.toLowerCase().includes(searchTerm) || p.Description?.toLowerCase().includes(searchTerm);
                const matchesCategory = currentCategory === 'All' || p.Category === currentCategory;
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                document.getElementById('emptyState').classList.remove('hidden');
            } else {
                document.getElementById('emptyState').classList.add('hidden');
                grid.innerHTML = filtered.map(item => `
                    <div class="bg-white rounded-[3rem] overflow-hidden border-4 border-white shadow-sm card-hover flex flex-col relative">
                        <!-- Category Badge -->
                        <div class="absolute top-6 left-6 z-10 bg-white/95 px-5 py-2 rounded-full text-[11px] font-medium uppercase tracking-wider text-pink-500 shadow-sm border border-pink-50">
                            ${item.Category}
                        </div>
                        
                        <!-- Image -->
                        <div class="h-72 overflow-hidden bg-pink-50 relative">
                            <img src="${item.ImageURL || 'https://via.placeholder.com/500x500?text=Ploypaw'}" 
                                alt="${item.ItemName}" 
                                class="w-full h-full object-cover"
                                onerror="this.src='https://via.placeholder.com/500x500?text=Ploypaw'">
                        </div>

                        <div class="p-8 flex-grow flex flex-col">
                            <h3 class="text-3xl font-medium text-gray-800 mb-2 leading-tight">${item.ItemName}</h3>
                            <p class="text-gray-400 text-sm mb-8 font-light italic line-clamp-2">"${item.Description || '-'}"</p>
                            
                            <div class="space-y-4">
                                <!-- Retail Section -->
                                <div class="flex items-center justify-between p-5 rounded-[1.5rem] bg-gray-50 border border-gray-100">
                                    <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">ปลีกการันตี</span>
                                    <div class="text-right">
                                        <span class="text-2xl font-medium text-gray-700">฿${item.RetailPrice}</span>
                                        <span class="text-xs text-gray-400 block font-light">/ ${item.RetailUnit}</span>
                                    </div>
                                </div>

                                <!-- Wholesale & Step Section -->
                                <div class="bulk-badge p-6 rounded-[2rem] text-white shadow-xl relative overflow-hidden group">
                                    <div class="flex justify-between items-start mb-2">
                                        <span class="text-xs font-medium uppercase bg-white/30 px-3 py-1 rounded-full text-white tracking-wide">ราคาส่ง</span>
                                        <span class="text-xs font-light opacity-90">ขั้นต่ำ ${item.MinWholesaleQty} ${item.WholesaleUnit}</span>
                                    </div>
                                    <div class="flex items-baseline gap-1 mb-4">
                                        <span class="text-4xl font-semibold">฿${item.WholesalePrice}</span>
                                        <span class="text-sm opacity-80 font-light">/ ${item.WholesaleUnit}</span>
                                    </div>

                                    ${item.BulkPrice && item.BulkPrice !== '0' ? `
                                    <div class="pt-4 border-t border-white/30 flex justify-between items-center">
                                        <div class="flex flex-col">
                                            <span class="text-xs font-medium uppercase tracking-tighter text-pink-100">Step พิเศษ!</span>
                                            <span class="text-[11px] font-light opacity-90">สั่ง ${item.BulkQty} ${item.WholesaleUnit ? item.WholesaleUnit.split(' ')[0] : ''} ขึ้นไป</span>
                                        </div>
                                        <div class="text-right">
                                            <span class="text-2xl font-semibold">฿${item.BulkPrice}</span>
                                        </div>
                                    </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function filterCategory(cat) {
            currentCategory = cat;
            renderUI();
        }

        document.getElementById('searchInput').addEventListener('input', updateGrid);
        window.onload = fetchData;
    </script>
</body>
</html>
