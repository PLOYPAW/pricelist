<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ploypaw - Product Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand-pink: #F96096; }
        * { font-family: 'Mitr', sans-serif; }
        body { background-color: #fff5f8; color: #4a5568; letter-spacing: -0.01em; }
        
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .card-hover { transition: all 0.3s ease; }
        @media (min-width: 1024px) {
            .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(249, 96, 150, 0.15); }
        }
        .bulk-badge { background: linear-gradient(135deg, #F96096 0%, #e04d82 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .modal-overlay { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header Section -->
    <header class="bg-[#F96096] text-white py-12 md:py-20 px-4 shadow-xl mb-6 relative overflow-hidden">
        <div class="absolute inset-0 opacity-10">
            <svg class="h-full w-full" fill="currentColor" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M0 100 Q 50 0 100 100 Z" />
            </svg>
        </div>
        <div class="max-w-6xl mx-auto text-center relative z-10">
            <h1 class="text-5xl md:text-7xl font-semibold mb-2 md:mb-4 tracking-tighter italic">Ploypaw Co.,Ltd.</h1>
            <div class="flex items-center justify-center gap-2">
                <span class="text-xl md:text-3xl animate-bounce">🐾</span>
                <p class="text-lg md:text-2xl font-normal text-pink-50">รายการสินค้าราคาส่ง</p>
                <span class="text-xl md:text-3xl animate-bounce">🐾</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6">
        <!-- Search & Filter -->
        <div class="glass sticky top-2 z-30 p-4 md:p-6 rounded-[1.5rem] md:rounded-[2rem] shadow-lg mb-8 flex flex-col gap-4 border border-pink-100">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-pink-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="searchInput" placeholder="ค้นหาจากชื่อสินค้า..." 
                    class="w-full pl-11 pr-4 py-3 md:py-4 rounded-full border-none ring-2 ring-pink-50 focus:ring-4 focus:ring-pink-200 outline-none transition-all text-base md:text-xl font-light">
            </div>
            <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar" id="categoryFilters"></div>
        </div>

        <div id="priceGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-8"></div>
        <div id="loading" class="text-center py-20"><div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-pink-500 mb-4"></div></div>
        <div id="emptyState" class="hidden text-center py-20"><p class="text-pink-300 text-xl font-medium">ไม่พบสินค้าที่คุณค้นหา</p></div>
    </main>

    <!-- Options Modal -->
    <div id="optionsModal" class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none modal-overlay bg-black/60 p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] overflow-hidden flex flex-col max-h-[80vh] shadow-2xl modal-content transform scale-90">
            <div class="p-6 bg-pink-500 text-white flex justify-between items-center">
                <h2 class="text-xl font-medium">ตัวเลือก/รสชาติสินค้า</h2>
                <button onclick="closeModal()" class="text-white hover:rotate-90 transition-transform"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div id="modalProductInfo" class="p-4 border-b border-gray-100 flex items-center gap-4"></div>
            <div id="optionsList" class="flex-grow overflow-y-auto p-6 grid grid-cols-1 gap-2 no-scrollbar"></div>
            <div class="p-4 bg-gray-50 text-center">
                <p class="text-sm text-gray-400 font-light italic">* ราคาอาจแตกต่างกันตามรสชาติหรือขนาดที่เลือก</p>
            </div>
        </div>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgOz7WIAMIIwhmJ8jPy7ouaRtOkJddwn7EvZW_9z7CGdOJIsVW-FuXdBaZbWlwNXUJSR-SrAf9iBpM/pub?output=csv'; 
        let rawProducts = []; 
        let groupedProducts = []; 
        let currentCategory = 'All';

        async function fetchData() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                rawProducts = csvToJSON(data);
                processGroupedData();
                renderUI();
            } catch (error) { 
                console.error("Fetch error:", error);
                document.getElementById('loading').innerHTML = '<p class="text-red-400">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
            }
        }

        function csvToJSON(csv) {
            const lines = csv.split("\n");
            const result = [];
            const headers = lines[0].split(",").map(h => h.trim().replace(/[^\w]/gi, ''));
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const obj = {};
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                for (let j = 0; j < headers.length; j++) {
                    let value = currentline[j]?.trim() || '';
                    obj[headers[j]] = value.replace(/^"(.*)"$/, '$1');
                }
                result.push(obj);
            }
            return result;
        }

        function processGroupedData() {
            const groups = {};
            
            rawProducts.forEach(item => {
                const name = item.ItemName.trim();
                if (!groups[name]) {
                    groups[name] = {
                        ...item,
                        allOptions: [] 
                    };
                }
                
                const optionsRaw = item.Options || item.Flavor || "";
                if (optionsRaw) {
                    const optArray = optionsRaw.split('|').map(o => o.trim());
                    groups[name].allOptions.push(...optArray);
                } else {
                    groups[name].allOptions.push(`รสชาติมาตรฐาน:${item.WholesalePrice}`);
                }
            });

            groupedProducts = Object.values(groups);
        }

        function renderUI() {
            document.getElementById('loading').classList.add('hidden');
            const categories = ['All', ...new Set(groupedProducts.map(p => p.Category).filter(Boolean))];
            document.getElementById('categoryFilters').innerHTML = categories.map(cat => `
                <button onclick="filterCategory('${cat}')" class="px-5 py-2 whitespace-nowrap rounded-full border transition-all ${currentCategory === cat ? 'bg-[#F96096] text-white border-[#F96096]' : 'bg-white text-pink-400 border-pink-100'}">${cat === 'All' ? 'ทั้งหมด' : cat}</button>
            `).join('');
            updateGrid();
        }

        function updateGrid() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = groupedProducts.filter(p => (p.ItemName?.toLowerCase().includes(searchTerm)) && (currentCategory === 'All' || p.Category === currentCategory));
            const grid = document.getElementById('priceGrid');
            const empty = document.getElementById('emptyState');
            
            if(filtered.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                grid.innerHTML = filtered.map((item, index) => {
                    const priceSteps = item.WholesalePriceStep ? item.WholesalePriceStep.split('|') : [];
                    
                    return `
                    <div class="bg-white rounded-[1.5rem] shadow-sm flex flex-col relative overflow-hidden card-hover border border-pink-50">
                        <img src="${item.ImageURL || 'https://via.placeholder.com/400'}" class="w-full aspect-square object-cover bg-pink-50">
                        <div class="p-3 md:p-5 flex-grow flex flex-col">
                            <h3 class="text-sm md:text-lg font-medium text-gray-800 line-clamp-2 h-10 md:h-12 mb-2">${item.ItemName}</h3>
                            
                            <div class="mb-3 space-y-1">
                                ${priceSteps.map(step => {
                                    const parts = step.split(':');
                                    return `
                                    <div class="flex justify-between text-[9px] md:text-[11px] text-gray-500 bg-pink-50/30 px-2 py-0.5 rounded border border-pink-50/50">
                                        <span>${parts[0]}+ ชิ้น</span>
                                        <span class="font-bold text-pink-500">฿${parts[1] || '0'}</span>
                                    </div>`;
                                }).join('')}
                            </div>

                            <div class="bulk-badge p-2 md:p-3 rounded-[1.2rem] text-white mt-auto">
                                <div class="flex items-baseline justify-center gap-1">
                                    <span class="text-lg md:text-2xl font-bold">฿${item.WholesalePrice}</span>
                                    <span class="text-[8px] md:text-[10px]">/ ${item.WholesaleUnit}</span>
                                </div>
                                ${item.BulkPrice && item.BulkQty ? `
                                <div class="mt-1 text-center border-t border-white/20 pt-1">
                                    <div class="text-[10px] md:text-xs font-medium italic">ยกลัง: ฿${item.BulkPrice} (${item.BulkQty} ชิ้น)</div>
                                </div>` : ''}
                                <button onclick="showOptionsByIndex(${index}, filteredDataRef)" class="w-full bg-white text-pink-500 mt-2 py-1.5 rounded-full text-[10px] md:text-xs font-bold hover:bg-pink-50 transition-all flex items-center justify-center gap-1 shadow-sm">
                                    <svg class="w-3 h-3 md:w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                                    ดูตัวเลือกทั้งหมด
                                </button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
                window.filteredDataRef = filtered;
            }
        }

        function showOptionsByIndex(idx, dataSource) {
            const item = dataSource[idx];
            const modal = document.getElementById('optionsModal');
            const info = document.getElementById('modalProductInfo');
            const list = document.getElementById('optionsList');
            
            info.innerHTML = `
                <img src="${item.ImageURL || 'https://via.placeholder.com/400'}" class="w-16 h-16 rounded-xl object-cover bg-pink-50">
                <div>
                    <h4 class="font-medium text-gray-800 text-sm leading-tight">${item.ItemName}</h4>
                    <p class="text-pink-500 font-bold text-lg mt-1">฿${item.WholesalePrice}</p>
                </div>
            `;

            const options = item.allOptions || [];

            if(options.length > 0) {
                const uniqueOptions = [...new Set(options)];
                
                list.innerHTML = uniqueOptions.map(opt => {
                    const parts = opt.split(':');
                    const name = parts[0].trim();
                    const price = parts[1] ? parts[1].trim() : item.WholesalePrice;

                    return `
                    <div class="flex items-center justify-between p-3 bg-white border border-pink-100 rounded-2xl shadow-sm hover:border-pink-300 transition-colors">
                        <div class="flex items-center gap-3">
                            <!-- Icon/Avatar เล็กๆ หน้าชื่อตัวเลือก -->
                            <div class="w-8 h-8 rounded-lg bg-pink-50 flex items-center justify-center overflow-hidden border border-pink-100">
                                <img src="${item.ImageURL || ''}" class="w-full h-full object-cover" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI0Y5NjA5NiI+PHBhdGggZD0iTTEyIDJjNS41IDAgMTAgNC41IDEwIDEwcy00LjUgMTAtMTAgMTBTMiAxNy41IDIgMTIgNi41IDIgMTIgMnptMCAyYy00LjQgMC04IDMuNi04IDhzMy42IDggOCA4IDgtMy42IDgtOC0zLjYtOC04LTh6bTAgM2MxLjY2IDAgMyAxLjM0IDMgM3MtMS4zNCAzLTMgM2MtMS42NiAwLTMtMS4zNC0zLTNzMS4zNC0zIDMtM3oiLz48L3N2Zz4='">
                            </div>
                            <span class="text-gray-700 font-medium">${name}</span>
                        </div>
                        <span class="text-pink-600 font-bold bg-pink-50 px-2 py-0.5 rounded-lg">฿${price}</span>
                    </div>`;
                }).join('');
            } else {
                list.innerHTML = `<div class="text-center py-10 opacity-40"><p>ไม่มีตัวเลือกเพิ่มเติม</p></div>`;
            }

            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.querySelector('.modal-content').classList.remove('scale-90');
            modal.querySelector('.modal-content').classList.add('scale-100');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('optionsModal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('.modal-content').classList.remove('scale-100');
            modal.querySelector('.modal-content').classList.add('scale-90');
            document.body.style.overflow = '';
        }

        function filterCategory(cat) { 
            currentCategory = cat; 
            renderUI(); 
        }

        document.getElementById('searchInput').addEventListener('input', updateGrid);
        window.onload = fetchData;
    </script>
</body>
</html>
